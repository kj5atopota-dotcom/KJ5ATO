<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural State Amateur Radio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1e3a;
    color: white;
    text-align: center;
}

.logo {
    width: 140px;
    margin: 12px auto;
}

.card {
    background: #132b50;
    margin: 10px;
    padding: 12px;
    border-radius: 12px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 8px;
}

.band {
    padding: 10px;
    border-radius: 8px;
}

.good { background: #1f8f4f; }
.fair { background: #c99700; }
.poor { background: #b02a2a; }

button {
    background: #1f6feb;
    border: none;
    padding: 10px;
    border-radius: 8px;
    color: white;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h2>Natural State Amateur Radio</h2>
<div>KJ5ATO Live Dashboard</div>

<button onclick="loadData()">Refresh</button>

<div class="card">
<h3>Solar Conditions</h3>
<div>Kp: <span id="kp">--</span></div>
<div>Wind: <span id="wind">--</span></div>
<div>Bz: <span id="bz">--</span></div>
</div>

<div class="card">
<h3>Band Conditions</h3>
<div class="grid">
<div id="b80" class="band">80m</div>
<div id="b40" class="band">40m</div>
<div id="b20" class="band">20m</div>
<div id="b15" class="band">15m</div>
<div id="b10" class="band">10m</div>
</div>
</div>

<div class="card">
<h3>MUF Estimate</h3>
<div id="muf">-- MHz</div>
</div>

<div class="card">
<h3>POTA QRP</h3>
<div id="pota">--</div>
</div>

<script>

async function loadData(){

try{

// KP
const kpRes = await fetch("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json");
const kpData = await kpRes.json();
const kp = kpData[kpData.length-1].kp_index;
document.getElementById("kp").innerText = kp;

// WIND
const windRes = await fetch("https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json");
const windData = await windRes.json();
const wind = windData[windData.length-1][2];
document.getElementById("wind").innerText = wind+" km/s";

// BZ
const bzRes = await fetch("https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json");
const bzData = await bzRes.json();
const bz = bzData[bzData.length-1][3];
document.getElementById("bz").innerText = bz+" nT";

// MUF (simple estimate)
let muf = 5 + (kp < 3 ? 10 : kp < 5 ? 7 : 4);
document.getElementById("muf").innerText = muf+" MHz";

// BAND LOGIC
function setBand(id, status){
    const el = document.getElementById(id);
    el.className = "band "+status;
    el.innerText = id.replace("b","")+"m "+status.toUpperCase();
}

// conditions
if(muf >= 14){
    setBand("b20","good");
    setBand("b15","good");
    setBand("b10","fair");
}else{
    setBand("b20","poor");
    setBand("b15","poor");
    setBand("b10","poor");
}

setBand("b40","good");
setBand("b80","good");

// POTA
let pota="";
if(kp >=5){
    pota="Run 40m. Tough conditions. Stay low and efficient.";
}else if(kp <=2){
    pota="20m hot. QRP will perform great.";
}else{
    pota="Mixed. Try 20m day / 40m night.";
}
document.getElementById("pota").innerText = pota;

}catch(e){
console.log(e);
}

}

loadData();

</script>

</body>
</html>
