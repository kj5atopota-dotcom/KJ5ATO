<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural State Amateur Radio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1e3a;
    color: #fff;
    text-align: center;
}

.container {
    padding: 10px;
}

h1 {
    margin: 5px;
    font-size: 20px;
}

.logo {
    max-width: 120px;
    margin: 10px auto;
}

.card {
    background: #132b50;
    margin: 8px;
    padding: 10px;
    border-radius: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 5px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #1f6feb;
    color: white;
    font-size: 14px;
}

.small {
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<img class="logo" src="logo.png">

<h1>Natural State Amateur Radio</h1>
<div class="small">KJ5ATO Dashboard</div>

<button onclick="loadData()">🔄 Refresh</button>

<div class="card">
<h3>Solar Conditions</h3>
<div>Kp Index: <span id="kp">--</span></div>
<div>Solar Wind: <span id="wind">--</span></div>
<div>Bz: <span id="bz">--</span></div>
</div>

<div class="card">
<h3>Band Conditions</h3>
<div>Best Band: <span id="bestBand">--</span></div>
<div>Noise Level: <span id="noise">--</span></div>
</div>

<div class="card">
<h3>POTA QRP Tips</h3>
<div id="pota">Loading...</div>
</div>

</div>

<script>

async function loadData() {

    try {
        // KP INDEX (REAL NOAA DATA)
        const kpRes = await fetch("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json");
        const kpData = await kpRes.json();
        const latestKp = kpData[kpData.length - 1].kp_index;

        document.getElementById("kp").innerText = latestKp;

        // WIND / BZ
        const windRes = await fetch("https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json");
        const windData = await windRes.json();
        const lastWind = windData[windData.length - 1];

        document.getElementById("wind").innerText = lastWind[2] + " km/s";

        const bzRes = await fetch("https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json");
        const bzData = await bzRes.json();
        const lastBz = bzData[bzData.length - 1];

        document.getElementById("bz").innerText = lastBz[3] + " nT";

        // SIMPLE BAND LOGIC
        let bestBand = "20m";
        let noise = "Moderate";

        if (latestKp >= 5) {
            bestBand = "40m";
            noise = "High";
        } else if (latestKp <= 2) {
            bestBand = "20m / 17m";
            noise = "Low";
        }

        document.getElementById("bestBand").innerText = bestBand;
        document.getElementById("noise").innerText = noise;

        // POTA QRP ADVICE
        let potaText = "";

        if (latestKp >= 5) {
            potaText = "Use 40m, low noise locations, vertical or EFHW. Expect rough conditions.";
        } else if (latestKp <= 2) {
            potaText = "20m hot. QRP SSB and FT8 should perform great. Go portable!";
        } else {
            potaText = "Mixed conditions. Try 20m daytime, 40m evening.";
        }

        document.getElementById("pota").innerText = potaText;

    } catch (err) {
        console.log(err);
    }
}

loadData();

</script>

</body>
</html>
